---
# Removes Outline VPN from servers and cleans up local facts.
#
# WARNING: this is a destructive operation. All Outline data
# (access keys, server settings) will be permanently deleted.
#
# Remove from all servers:
#   ansible-playbook -i inventory/hosts.yml uninstall.yml
#
# Remove from a single host:
#   ansible-playbook -i inventory/hosts.yml uninstall.yml --limit my-server
#
# Dry-run (preview what will be removed):
#   ansible-playbook -i inventory/hosts.yml uninstall.yml --check

- name: Uninstall Outline VPN
  hosts: vpn_servers
  gather_facts: false

  tasks:
    - name: Confirm uninstall
      ansible.builtin.pause:
        prompt: >
          WARNING: This will permanently remove Outline from
          {{ ansible_play_hosts | join(', ') }}.
          Press Enter to continue or Ctrl+C to abort.
      run_once: true
      delegate_to: localhost

    # ── Stop and remove containers ────────────────────────────────────────────

    - name: Check if Docker is available
      ansible.builtin.command: docker info
      register: outline_docker_info
      changed_when: false
      failed_when: false

    - name: Stop and remove Outline containers
      ansible.builtin.shell: |
        docker stop shadowbox watchtower 2>/dev/null || true
        docker rm   shadowbox watchtower 2>/dev/null || true
      when: outline_docker_info.rc == 0
      changed_when: true

    - name: Remove Outline Docker images
      ansible.builtin.shell: |
        set -o pipefail
        docker images | grep -E 'outline|shadowbox|watchtower' | awk '{print $3}' | xargs docker rmi 2>/dev/null || true
      args:
        executable: /bin/bash
      when: outline_docker_info.rc == 0
      changed_when: true

    # ── Remove Outline files ──────────────────────────────────────────────────

    - name: Remove Outline data directory
      ansible.builtin.file:
        path: /opt/outline
        state: absent

    - name: Remove get_outline_str utility
      ansible.builtin.file:
        path: /usr/local/bin/get_outline_str
        state: absent

    # ── Clean up local facts on control node ─────────────────────────────────

    - name: Remove local facts file for this host
      ansible.builtin.file:
        path: "{{ playbook_dir }}/inventory/facts/{{ inventory_hostname }}.yml"
        state: absent
      delegate_to: localhost
      become: false

    - name: Uninstall complete
      ansible.builtin.debug:
        msg: "Outline successfully removed from {{ inventory_hostname }} ({{ ansible_host }})"
