---
# Role default values.
# Override via group_vars or per-host variables in hosts.yml.

outline_server_name: "Outline VPN"
outline_metrics_enabled: false
outline_default_port: ~          # ~ = leave unchanged
outline_default_limit_bytes: ~   # ~ = leave unchanged; 0 = remove limit
outline_hostname: ~              # ~ = leave unchanged (server IP is used)

# Populated automatically after installation.
# Can be set manually for an already-existing server.
outline_management_url: ~
